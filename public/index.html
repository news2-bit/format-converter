<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Format Converter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
      font-size: 28px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
      font-size: 14px;
    }

    input[type="file"],
    select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type="file"]:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
    }

    select {
      cursor: pointer;
      background-color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .preview {
      margin-top: 24px;
      text-align: center;
    }

    .preview img {
      max-width: 100%;
      max-height: 300px;
      border-radius: 6px;
      margin-top: 12px;
    }

    .message {
      padding: 12px;
      border-radius: 6px;
      margin-top: 16px;
      font-size: 14px;
    }

    .success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #81c784;
    }

    .error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef5350;
    }

    .loading {
      display: none;
      text-align: center;
      color: #667eea;
      font-size: 14px;
      margin-top: 12px;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #e0e0e0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🖼️ Image Converter</h1>

    <form id="converterForm">
      <div class="form-group">
        <label for="imageInput">Select Image</label>
        <input type="file" id="imageInput" accept="image/*" required>
      </div>

      <div class="form-group">
        <label for="formatSelect">Target Format</label>
        <select id="formatSelect" required>
          <option value="">Choose format...</option>
          <option value="png">PNG</option>
          <option value="jpg">JPG</option>
        </select>
      </div>

      <button type="submit">Convert Image</button>
    </form>

    <div class="loading" id="loading">
      <span class="spinner"></span>Converting...
    </div>

    <div id="message"></div>

    <div class="preview" id="preview"></div>
  </div>

  <script>
    const form = document.getElementById('converterForm');
    const imageInput = document.getElementById('imageInput');
    const formatSelect = document.getElementById('formatSelect');
    const messageDiv = document.getElementById('message');
    const previewDiv = document.getElementById('preview');
    const loading = document.getElementById('loading');
    const button = form.querySelector('button');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!imageInput.files[0] || !formatSelect.value) {
        showMessage('Please select an image and format', 'error');
        return;
      }

      try {
        loading.style.display = 'block';
        button.disabled = true;
        messageDiv.innerHTML = '';
        previewDiv.innerHTML = '';

        const formData = new FormData();
        formData.append('image', imageInput.files[0]);
        formData.append('format', formatSelect.value);

        const response = await fetch('/convert', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          throw new Error('Conversion failed');
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const ext = formatSelect.value === 'jpg' ? 'jpg' : 'png';
        const filename = `converted.${ext}`;

        previewDiv.innerHTML = `
          <img src="${url}" alt="Converted image">
          <a href="${url}" download="${filename}" style="display: block; margin-top: 12px; color: #667eea; text-decoration: none; font-weight: 600;">
            ⬇️ Download ${filename}
          </a>
        `;

        showMessage('✓ Image converted successfully!', 'success');
      } catch (err) {
        showMessage('Error converting image', 'error');
        console.error(err);
      } finally {
        loading.style.display = 'none';
        button.disabled = false;
      }
    });

    function showMessage(text, type) {
      messageDiv.className = `message ${type}`;
      messageDiv.textContent = text;
    }
  </script>
</body>
</html>
